<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 520"><defs><style>@keyframes typing1{0%,5%{opacity:0}8%{opacity:1}}@keyframes typing2{0%,10%{opacity:0}13%{opacity:1}}@keyframes typing3{0%,18%{opacity:0}21%{opacity:1}}@keyframes typing4{0%,28%{opacity:0}31%{opacity:1}}@keyframes typing5{0%,38%{opacity:0}41%{opacity:1}}@keyframes typing6{0%,48%{opacity:0}51%{opacity:1}}@keyframes typing7{0%,58%{opacity:0}61%{opacity:1}}@keyframes typing8{0%,68%{opacity:0}71%{opacity:1}}@keyframes typing9{0%,78%{opacity:0}81%{opacity:1}}@keyframes typing10{0%,88%{opacity:0}91%{opacity:1}}@keyframes blink{0%,49%{opacity:1}50%{opacity:0}}.line1{animation:typing1 12s infinite}.line2{animation:typing2 12s infinite}.line3{animation:typing3 12s infinite}.line4{animation:typing4 12s infinite}.line5{animation:typing5 12s infinite}.line6{animation:typing6 12s infinite}.line7{animation:typing7 12s infinite}.line8{animation:typing8 12s infinite}.line9{animation:typing9 12s infinite}.line10{animation:typing10 12s infinite}.cursor{animation:blink 1s infinite}.terminal{font-family:&apos;SF Mono&apos;,&apos;Monaco&apos;,&apos;Consolas&apos;,monospace;font-size:13px}.prompt{fill:#50fa7b}.command{fill:#f8f8f2}.output{fill:#bd93f9}.success{fill:#50fa7b}.error{fill:#f55}.comment{fill:#6272a4}.cyan{fill:#8be9fd}.yellow{fill:#f1fa8c}</style></defs><rect width="800" height="520" fill="#282a36" rx="10"/><rect width="800" height="30" fill="#44475a" rx="10"/><rect width="800" height="10" y="20" fill="#44475a"/><circle cx="20" cy="15" r="6" fill="#f55"/><circle cx="40" cy="15" r="6" fill="#f1fa8c"/><circle cx="60" cy="15" r="6" fill="#50fa7b"/><text x="400" y="20" fill="#f8f8f2" font-family="system-ui" font-size="13" text-anchor="middle">AgentMesh — MCP Proxy Demo</text><g class="terminal"><g class="line1"><text y="0" transform="translate(20, 52)"><tspan class="prompt">$ </tspan><tspan class="command">pip install agentmesh-platform</tspan></text></g><g class="line2"><text y="24" class="output" transform="translate(20, 52)">Successfully installed agentmesh-platform-0.5.0</text></g><g class="line3"><text y="56" transform="translate(20, 52)"><tspan class="prompt">$ </tspan><tspan class="command">agentmesh proxy --policy strict --target npx \</tspan></text><text y="74" transform="translate(20, 52)"><tspan class="command">-y @modelcontextprotocol/server-filesystem /Users/me</tspan></text></g><g class="line4"><text y="108" class="cyan" transform="translate(20, 52)">🔒 AgentMesh Proxy Started</text><text y="128" class="comment" transform="translate(20, 52)">Policy: strict | Trust threshold: 700</text><text y="148" class="comment" transform="translate(20, 52)">Wrapping: @modelcontextprotocol/server-filesystem</text><text y="168" class="comment" transform="translate(20, 52)">Listening for MCP tool calls...</text></g><g class="line5"><text y="196" class="comment" transform="translate(20, 52)">───────────────────────────────────────────────────</text></g><g class="line6"><text y="222" class="yellow" transform="translate(20, 52)">📝 Action: write_file /etc/passwd</text><text y="242" class="comment" transform="translate(20, 52)">Agent: coding-assistant | Trust score: 320</text></g><g class="line7"><text y="266" class="error" transform="translate(20, 52)">❌ BLOCKED: Policy violation — write to restricted path</text><text y="286" class="error" transform="translate(20, 52)">Action denied and flagged for review</text></g><g class="line8"><text y="314" class="comment" transform="translate(20, 52)">───────────────────────────────────────────────────</text></g><g class="line9"><text y="340" class="yellow" transform="translate(20, 52)">📝 Action: read_file /workspace/report.csv</text><text y="360" class="comment" transform="translate(20, 52)">Agent: data-analyst | Trust score: 847</text><text y="384" class="success" transform="translate(20, 52)">✅ ALLOWED: Trust score 847 | Audit logged</text></g><g class="line10"><text y="418" transform="translate(20, 52)"><tspan class="prompt">$ </tspan><tspan fill="#f8f8f2" class="cursor">▌</tspan></text></g><g transform="translate(20, 52) translate(0, 434)"><rect width="760" height="40" fill="#44475a" rx="5"/><text y="25" fill="#8be9fd" font-size="12">AgentMesh MCP Proxy:</text><text x="182" y="25" fill="#f8f8f2" font-size="12">Zero-trust security for every MCP tool call • Policy enforcement • Full audit trail</text></g></g></svg>