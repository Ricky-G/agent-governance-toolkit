<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500"><defs><style>@keyframes typing1{0%,10%{opacity:0}15%{opacity:1}}@keyframes typing2{0%,20%{opacity:0}25%{opacity:1}}@keyframes typing3{0%,30%{opacity:0}35%{opacity:1}}@keyframes typing4{0%,40%{opacity:0}45%{opacity:1}}@keyframes typing5{0%,50%{opacity:0}55%{opacity:1}}@keyframes typing6{0%,60%{opacity:0}65%{opacity:1}}@keyframes typing7{0%,70%{opacity:0}75%{opacity:1}}@keyframes typing8{0%,80%{opacity:0}85%{opacity:1}}@keyframes blink{0%,49%{opacity:1}50%{opacity:0}}.line1{animation:typing1 8s infinite}.line2{animation:typing2 8s infinite}.line3{animation:typing3 8s infinite}.line4{animation:typing4 8s infinite}.line5{animation:typing5 8s infinite}.line6{animation:typing6 8s infinite}.line7{animation:typing7 8s infinite}.line8{animation:typing8 8s infinite}.cursor{animation:blink 1s infinite}.terminal{font-family:&apos;SF Mono&apos;,&apos;Monaco&apos;,&apos;Consolas&apos;,monospace;font-size:14px}.prompt{fill:#50fa7b}.command{fill:#f8f8f2}.output{fill:#bd93f9}.success{fill:#50fa7b}.error{fill:#f55}</style></defs><rect width="800" height="500" fill="#282a36" rx="10"/><rect width="800" height="30" fill="#44475a" rx="10"/><circle cx="20" cy="15" r="6" fill="#f55"/><circle cx="40" cy="15" r="6" fill="#f1fa8c"/><circle cx="60" cy="15" r="6" fill="#50fa7b"/><text x="400" y="20" fill="#f8f8f2" font-family="system-ui" font-size="13" text-anchor="middle">Agent OS - Terminal Demo</text><g class="terminal"><g class="line1"><text y="0" transform="translate(20, 55)"><tspan class="prompt">$ </tspan><tspan class="command">pip install agent-os</tspan></text></g><g class="line2"><text y="25" class="output" transform="translate(20, 55)">Successfully installed agent-os-1.1.0</text></g><g class="line3"><text y="60" transform="translate(20, 55)"><tspan class="prompt">$ </tspan><tspan class="command">python examples/hello-world/agent.py</tspan></text></g><g class="line4"><text y="95" class="output" transform="translate(20, 55)">🚀 Hello World Agent</text><text y="115" class="output" transform="translate(20, 55)">====================</text></g><g class="line5"><text y="145" class="success" transform="translate(20, 55)">✅ Agent executed successfully</text><text y="165" class="output" transform="translate(20, 55)">📤 Result: Hello from a governed agent, World!</text></g><g class="line6"><text y="200" transform="translate(20, 55)"><tspan class="prompt">$ </tspan><tspan class="command">python -c &quot;from agent_os import KernelSpace; k=KernelSpace(); k.execute(&apos;DROP TABLE users&apos;)&quot;</tspan></text></g><g class="line7"><text y="235" class="error" transform="translate(20, 55)">❌ SIGKILL: Policy violation detected</text><text y="255" class="error" transform="translate(20, 55)">Action &apos;DROP TABLE&apos; blocked by kernel policy</text></g><g class="line8"><text y="295" transform="translate(20, 55)"><tspan class="prompt">$ </tspan><tspan fill="#f8f8f2" class="cursor">▌</tspan></text></g><g transform="translate(20, 55) translate(0, 330)"><rect width="760" height="80" fill="#44475a" rx="5"/><text y="25" fill="#8be9fd" font-weight="bold">Agent OS Key Features:</text><text y="50" fill="#f8f8f2">• Kernel-level policy enforcement (not prompt-based)</text><text y="70" fill="#f8f8f2">• 0% policy violations guaranteed • Works with LangChain, CrewAI, AutoGen</text></g></g></svg>